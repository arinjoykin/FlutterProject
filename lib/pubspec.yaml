name: warehouse_app
description: A Flutter app for warehouse inventory tracking
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  uuid: ^4.5.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2
  image_picker: ^1.1.2
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  path: ^1.8.3   


  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5

  connectivity_plus: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/